# Ultralytics ByteTrack configuration for VisDrone aerial MOT.
# IMPORTANT: call model.track(..., conf=0.10, iou=0.60, tracker=<this file>)
# so detections in [0.10, 0.25) reach the second association stage.

tracker_type: bytetrack

# Two-stage association thresholds
track_high_thresh: 0.25
track_low_thresh: 0.10

# Do not initialize a new trajectory from weak detections.
new_track_thresh: 0.35

# Initial baseline: about 1 second at 25-30 fps. Test 45 or 60 only after
# measuring whether longer memory improves AssA/IDF1 without increasing IDS.
track_buffer: 30

# Higher values make matching more lenient in Ultralytics.
match_thresh: 0.80
fuse_score: True